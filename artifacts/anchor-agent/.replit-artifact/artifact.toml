kind = "web"
previewPath = "/"
title = "Anchor Agent"
version = "1.0.0"
id = "artifacts/anchor-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23240

[services.development]
run = "pnpm --filter @workspace/anchor-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anchor-agent", "run", "build" ]
publicDir = "artifacts/anchor-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23240"
BASE_PATH = "/"
